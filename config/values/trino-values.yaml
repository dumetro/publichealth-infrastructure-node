server:
  workers: 2

coordinator:
  jvm:
    maxHeapSize: "4G"
  resources:
    requests:
      memory: "4Gi"
      cpu: "1"
    limits:
      memory: "6Gi"
      cpu: "2"

worker:
  jvm:
    maxHeapSize: "4G"
  resources:
    requests:
      memory: "4Gi"
      cpu: "1"
    limits:
      memory: "6Gi"
      cpu: "2"

additionalCatalogs:
  iceberg: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://unity-catalog.data-stack.svc.cluster.local:8080/api/2.1/unity-catalog/iceberg
    iceberg.rest-catalog.security=OAUTH2
    # Token value is injected by deploy/deploy-node.sh or terraform/main.tf.
    iceberg.rest-catalog.oauth2.token=${UC_ACCESS_TOKEN}
    fs.native-s3.enabled=true
    s3.endpoint=http://minio.data-stack.svc.cluster.local:9000
    s3.path-style-access=true
