# JupyterHub workspace configuration — Public Health AI Node
# Applied via: helm upgrade --install jupyterhub jupyterhub/jupyterhub -f this-file

hub:
  config:
    JupyterHub:
      authenticator_class: dummy
    Authenticator:
      admin_users:
        - admin
    DummyAuthenticator:
      # NOTE: Do not commit a real shared password here.
      # Provide a non-empty password via a non-committed override values file, for example:
      #   helm upgrade --install jupyterhub jupyterhub/jupyterhub \
      #     -f config/values/jupyterhub-values.yaml \
      #     -f config/values/jupyterhub-values.local.yaml
      # The local override file should be excluded from version control.
      password: ""

  extraConfig:
    pre_spawn_hook.py: |
      async def workspace_pre_spawn_hook(spawner):
          import urllib.request, json
          username = spawner.user.name
          ws_svc = "http://workspace-service.data-stack.svc.cluster.local:8000"
          try:
              req = urllib.request.Request(
                  f"{ws_svc}/api/v1/users/{username}/spawn-config",
                  headers={"X-Hub-Internal": "true"}
              )
              with urllib.request.urlopen(req, timeout=5) as resp:
                  config = json.loads(resp.read())
          except Exception as e:
              spawner.log.warning(f"workspace-service unreachable: {e}")
              config = {}

          # Replace shared MinIO root creds with per-user creds
          minio_secret = config.get("minio_secret_name")
          if minio_secret:
              for key in ("AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY"):
                  spawner.environment.pop(key, None)
              spawner.volumes.append({"name": "minio-user-creds", "secret": {"secretName": minio_secret}})
              spawner.volume_mounts.append({"name": "minio-user-creds", "mountPath": "/vault/minio-creds", "readOnly": True})

          # Mount git credentials
          git_secret = config.get("git_secret_name")
          git_type = config.get("git_credential_type")
          if git_secret and git_type == "https_token":
              spawner.volumes.append({"name": "git-creds", "secret": {"secretName": git_secret}})
              spawner.volume_mounts.append({"name": "git-creds", "mountPath": "/home/jovyan/.git-credentials-file", "subPath": "git-credentials", "readOnly": True})
          elif git_secret and git_type == "ssh_key":
              spawner.volumes.append({"name": "git-ssh", "secret": {"secretName": git_secret, "defaultMode": 0o400}})
              spawner.volume_mounts.append({"name": "git-ssh", "mountPath": "/home/jovyan/.ssh", "readOnly": True})

      c.KubeSpawner.pre_spawn_hook = workspace_pre_spawn_hook

proxy:
  service:
    type: ClusterIP

# Ingress is created via kubectl apply at the end of deploy-node.sh (step 10) so that
# all service ingresses are applied after every helm release is installed. This avoids
# nginx admission webhook conflicts caused by chart-managed ingresses with wrong hosts.

# This deployment uses a locally built single-user image imported into k3s.
# Disable both chart pre-pullers so Helm upgrades do not block on registry pulls
# for the `latest` tag.
prePuller:
  hook:
    enabled: false
  continuous:
    enabled: false

singleuser:
  # Built by bootstrap.sh and imported into k3s containerd
  image:
    name: jupyter-health-env
    tag: latest
    pullPolicy: Never

  # Persistent home directory per user (survives pod restarts)
  storage:
    dynamic:
      storageClass: local-path
    capacity: 10Gi
    homeMountPath: /home/jovyan

  # Connection details for platform services
  # Per-user MinIO credentials are injected via workspace-service pre_spawn_hook
  extraEnv:
    MLFLOW_TRACKING_URI: "http://mlflow.data-stack.svc.cluster.local:5000"
    AWS_ENDPOINT_URL: "http://minio.data-stack.svc.cluster.local:9000"
    AWS_DEFAULT_REGION: "us-east-1"

  # Default resource envelope; overridden per-profile below
  cpu:
    limit: 2
    guarantee: 0.5
  memory:
    limit: 4G
    guarantee: 1G

  # Compute profiles presented to users at server spawn
  profileList:
    - display_name: "Standard — 1 CPU / 2 GB"
      description: "Data exploration, SQL queries, light ETL."
      default: true
      kubespawner_override:
        cpu_limit: 1
        cpu_guarantee: 0.5
        mem_limit: "2G"
        mem_guarantee: "1G"

    - display_name: "Large Compute — 2 CPU / 4 GB"
      description: "ML training, feature engineering, heavy data processing."
      kubespawner_override:
        cpu_limit: 2
        cpu_guarantee: 1
        mem_limit: "4G"
        mem_guarantee: "2G"

# Disable multi-node user scheduler — this node is single-node k3s
scheduling:
  userScheduler:
    enabled: false

# Cull idle single-user servers to reclaim resources
cull:
  enabled: true
  timeout: 3600   # Cull after 1 hour idle
  every: 600      # Check every 10 minutes
