# Airflow orchestration configuration — Public Health AI Node
# Secrets are sourced from the pre-created Kubernetes secret `airflow-secrets`.

# Pre-created secret with key 'connection' holding the full SQLAlchemy DSN.
# Using metadataSecretName bypasses the chart's own DSN construction entirely,
# which defaults to airflow-postgresql.data-stack when postgresql.enabled=false.
# The secret is created by deploy-node.sh before this chart is installed.
# Airflow connects directly to PostgreSQL (not via PgBouncer) to avoid SCRAM/pool-mode
# compatibility issues with Airflow's internal connection pooler.
data:
  metadataSecretName: airflow-metadata

executor: KubernetesExecutor

defaultAirflowRepository: apache/airflow
defaultAirflowTag: "3.1.8"

images:
  useDefaultImageForMigration: true

postgresql:
  enabled: false

redis:
  enabled: false

pgbouncer:
  enabled: false

statsd:
  enabled: false

rbac:
  create: true

extraPipPackages:
  - apache-airflow-providers-apache-spark

config:
  core:
    load_examples: "False"
  kubernetes_executor:
    namespace: data-stack
    delete_worker_pods: "True"
    delete_worker_pods_on_failure: "False"

# extraEnv injects full Kubernetes env var specs into all Airflow component pods.
# This is the only reliable way to supply secretKeyRef values — the chart's top-level
# `env` field only accepts {name, value} pairs and rejects valueFrom.
extraEnv: |
  - name: AIRFLOW__CORE__FERNET_KEY
    valueFrom:
      secretKeyRef:
        name: airflow-secrets
        key: fernet_key
  - name: AIRFLOW__WEBSERVER__SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: airflow-secrets
        key: webserver_secret_key
  - name: AIRFLOW_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: airflow-secrets
        key: admin_password

webserver:
  service:
    type: ClusterIP
  defaultUser:
    enabled: false

scheduler:
  replicas: 1

triggerer:
  enabled: true
  replicas: 1

createUserJob:
  enabled: true
  useHelmHooks: false
  applyCustomEnv: true
  command:
    - bash
    - -ec
  args:
    - |
      airflow users create \
        --role "${AIRFLOW_ADMIN_ROLE:-Admin}" \
        --username "${AIRFLOW_ADMIN_USERNAME}" \
        --email "${AIRFLOW_ADMIN_EMAIL}" \
        --firstname "${AIRFLOW_ADMIN_FIRSTNAME}" \
        --lastname "${AIRFLOW_ADMIN_LASTNAME}" \
        --password "${AIRFLOW_ADMIN_PASSWORD}"
  env:
    - name: AIRFLOW_ADMIN_USERNAME
      value: admin
    - name: AIRFLOW_ADMIN_EMAIL
      value: admin@example.com
    - name: AIRFLOW_ADMIN_FIRSTNAME
      value: Airflow
    - name: AIRFLOW_ADMIN_LASTNAME
      value: Admin
    - name: AIRFLOW_ADMIN_ROLE
      value: Admin

# Ingress is configured dynamically via the AIRFLOW_INGRESS_VALUES temp file in
# deploy-node.sh using ingress.apiServer.host (simple string) and ingress.apiServer.hosts
# (object array) so the correct format is set regardless of chart minor version.
