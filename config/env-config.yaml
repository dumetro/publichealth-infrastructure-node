global:
  domain: dakar-datasphere-node.local
  storageClass: "local-path"
  namespace: "data-stack"

postgres:
  image:
    repository: "postgres-health-ext"
    tag: "16"
  database: "health_node"
  appUser: "health_app"
  # Set POSTGRES_SUPERUSER_PASSWORD and POSTGRES_APP_PASSWORD in your shell before deploy.
  superuserPassword: "CHANGEME"
  appPassword: "CHANGEME"
  persistence:
    size: "50Gi"
  backup:
    schedule: "0 2 * * *"
    retentionDays: 7
    historyLimit: 5
    pvcSize: "20Gi"

pgbouncer:
  poolMode: "transaction"
  maxClientConn: 500
  defaultPoolSize: 40
  reservePoolSize: 10

minio:
  rootUser: "admin"
  # Set MINIO_ROOT_PASSWORD in your shell before deploy; never commit real secrets.
  rootPassword: "CHANGEME"
  hostname: "minio.dakar-datasphere-node.local"
  persistence:
    size: "250Gi"
  buckets:
    - raw
    - standard
    - published

unity_catalog:
  # Set UNITY_CATALOG_ADMIN_TOKEN in your shell before deploy.
  admin_token: "CHANGEME"

jupyterhub:
  auth_type: "dummy"
  hostname: "jupyter.dakar-datasphere-node.local"

airflow:
  hostname: "airflow.dakar-datasphere-node.local"

mlflow:
  s3_endpoint: "http://minio.data-stack.svc.cluster.local:9000"

monitoring:
  enabled: true
  grafana:
    # Set GRAFANA_ADMIN_PASSWORD in your shell before deploy.
    adminPassword: "CHANGEME"
    domain: "grafana.dakar-datasphere-node.local"
  prometheus:
    retention: "15d"
